name: Calcumegator
options:
  bundleIdPrefix: com.pixelatedstudios
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  Calcumegator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Models
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Calcumegator
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelatedstudios.calcumegator
        INFOPLIST_FILE: Sources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
